name: Release

on:
  push:
    tags:
      - 'bot-miki/v*'
      - 'prestashop/v*'

jobs:
  release-bot-miki:
    if: startsWith(github.ref, 'refs/tags/bot-miki/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @kpcrop/shared build
      - run: pnpm --filter bot-miki build

      - name: Build Docker image
        run: |
          VERSION=${GITHUB_REF#refs/tags/bot-miki/}
          docker build -t kpcrop/bot-miki:$VERSION -t kpcrop/bot-miki:latest packages/bot-miki

      # Descomentar cuando se configure el registry de Docker
      # - name: Push to registry
      #   run: docker push kpcrop/bot-miki:$VERSION

  release-prestashop:
    if: startsWith(github.ref, 'refs/tags/prestashop/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package PrestaShop module
        run: |
          VERSION=${GITHUB_REF#refs/tags/prestashop/}
          cd packages/cms-prestashop
          zip -r ../../bsalesync-$VERSION.zip bsalesync/ -x "*.git*" -x "tests/*"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bsalesync-*.zip
          generate_release_notes: true
